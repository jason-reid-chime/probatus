name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Frontend deploys automatically via Vercel's GitHub integration.
  # Backend deploys automatically via Railway's GitHub integration.
  # This job verifies both are healthy after the push.

  health-check:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    # Give Railway/Vercel up to 3 minutes to finish deploying
    # before we ping the health endpoint.
    steps:
      - name: Wait for Railway deploy
        run: sleep 90

      - name: Backend health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://probatus-api-production.up.railway.app/health)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check FAILED (HTTP $STATUS)"
            exit 1
          fi
          echo "Backend is healthy."
